kind = "web"
previewPath = "/"
title = "Formed - Construction & Development"
version = "1.0.0"
id = "artifacts/formed-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25817

[services.development]
run = "pnpm --filter @workspace/formed-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/formed-site", "run", "build" ]
publicDir = "artifacts/formed-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25817"
BASE_PATH = "/"
